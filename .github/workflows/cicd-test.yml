name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install project + deps
        run: pip install -e .

      - name: Install browsers
        run: playwright install --with-deps

      - name: Run tests
        run: pytest Tests/ -v -s
