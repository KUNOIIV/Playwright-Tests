name: Playwright Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pytest pytest-playwright
          playwright install --with-deps chromium firefox
        working-directory: .

      - name: Install project editable (makes 'pages' visible everywhere)
        run: pip install -e .
        working-directory: .

      - name: Debug paths (optional, remove later)
        run: |
          pwd
          ls -la
          python -c "import sys; print(sys.path)"
        working-directory: .

      - name: Run tests
        run: python -m pytest Tests/ -v
        working-directory: .
