name: Playwright Tests

on:
  push:
    branches:
      - main  
  pull_request:  
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  
      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium firefox
      - name: Run tests
        run:  python "CSV Tests.py" python "Bad login test with wrong creds.py" python "login test v2_test.py" python "loop control structure.py" python "saucedemo_login.py" 
